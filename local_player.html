<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sae — local player</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #1B1712;
    --surface: #262019;
    --surface-2: #2F271D;
    --cream: #F2EAD9;
    --muted: #8A7C67;
    --amber: #D98E3F;
    --amber-dim: #7A5A2C;
    --line: #3A3024;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    background: var(--bg);
    color: var(--cream);
    font-family: 'Inter', sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  body{
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
  }
  .deck{
    width:100%;
    max-width:640px;
    background: var(--surface);
    border:1px solid var(--line);
    border-radius:14px;
    overflow:hidden;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.6);
  }

  /* header / counter */
  .head{
    padding:24px 28px 20px;
    border-bottom:1px solid var(--line);
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    gap:16px;
  }
  .brand{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:20px;
    letter-spacing:0.02em;
  }
  .brand span{ color: var(--amber); }
  .brand small{
    display:block;
    font-family:'Inter', sans-serif;
    font-weight:400;
    font-size:11.5px;
    color: var(--muted);
    letter-spacing:0.06em;
    text-transform:uppercase;
    margin-top:4px;
  }
  .counter{
    font-family:'JetBrains Mono', monospace;
    font-size:26px;
    font-weight:700;
    color: var(--amber);
    letter-spacing:0.04em;
    font-variant-numeric: tabular-nums;
  }
  .counter .total{ color:var(--muted); font-size:15px; font-weight:400; }

  /* now playing strip */
  .nowplaying{
    padding:22px 28px 10px;
  }
  .np-title{
    font-family:'Space Grotesk', sans-serif;
    font-size:18px;
    font-weight:500;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .np-empty{ color: var(--muted); font-style:normal; }

  .seek{
    -webkit-appearance:none;
    appearance:none;
    width:100%;
    height:3px;
    background: var(--line);
    border-radius:2px;
    margin:16px 0 6px;
    cursor:pointer;
    outline:none;
  }
  .seek::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:12px; height:12px;
    border-radius:50%;
    background: var(--amber);
    cursor:pointer;
    box-shadow: 0 0 0 4px rgba(217,142,63,0.15);
  }
  .seek::-moz-range-thumb{
    width:12px; height:12px;
    border:none;
    border-radius:50%;
    background: var(--amber);
    cursor:pointer;
  }

  /* transport controls */
  .transport{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:22px;
    padding:8px 28px 24px;
  }
  .tbtn{
    background:none;
    border:none;
    color: var(--cream);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0.85;
    transition: opacity 0.15s, transform 0.15s;
  }
  .tbtn:hover{ opacity:1; transform:translateY(-1px); }
  .tbtn svg{ width:20px; height:20px; }
  .tbtn.play{
    width:52px; height:52px;
    border-radius:50%;
    background: var(--amber);
    color: var(--bg);
    opacity:1;
  }
  .tbtn.play svg{ width:22px; height:22px; }
  .tbtn.play:hover{ background:#e5a256; }

  .vol{
    display:flex;
    align-items:center;
    gap:8px;
    padding:0 28px 20px;
    justify-content:center;
  }
  .vol svg{ width:15px; height:15px; color:var(--muted); flex-shrink:0; }
  .vol input[type=range]{
    -webkit-appearance:none;
    width:110px;
    height:3px;
    background: var(--line);
    border-radius:2px;
    cursor:pointer;
  }
  .vol input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:10px; height:10px;
    border-radius:50%;
    background: var(--muted);
    cursor:pointer;
  }

  /* shelf / playlist */
  .shelf-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 28px 10px;
    border-top:1px solid var(--line);
  }
  .shelf-label{
    font-family:'Space Grotesk', sans-serif;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.1em;
    color: var(--muted);
  }
  .add-btn{
    font-family:'Inter', sans-serif;
    font-size:12.5px;
    font-weight:500;
    color: var(--amber);
    background: rgba(217,142,63,0.1);
    border:1px solid var(--amber-dim);
    padding:6px 12px;
    border-radius:20px;
    cursor:pointer;
  }
  .add-btn:hover{ background: rgba(217,142,63,0.18); }
  #fileInput{ display:none; }

  .dropzone{
    margin:8px 28px 6px;
    padding:26px;
    border:1.5px dashed var(--line);
    border-radius:10px;
    text-align:center;
    color: var(--muted);
    font-size:13px;
    transition: border-color 0.15s, color 0.15s;
  }
  .dropzone.drag{
    border-color: var(--amber);
    color: var(--amber);
  }

  .tracklist{
    list-style:none;
    padding: 4px 12px 20px;
    max-height:280px;
    overflow-y:auto;
  }
  .track{
    display:flex;
    align-items:center;
    gap:14px;
    padding:11px 16px;
    border-radius:8px;
    cursor:pointer;
  }
  .track:hover{ background: var(--surface-2); }
  .track.active{ background: var(--surface-2); }
  .tnum{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color: var(--muted);
    width:20px;
    flex-shrink:0;
  }
  .track.active .tnum{ color: var(--amber); }
  .tname{
    flex:1;
    font-size:14px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .tdur{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color: var(--muted);
    flex-shrink:0;
  }
  .eq{
    width:14px; height:12px;
    display:flex;
    align-items:flex-end;
    gap:2px;
    flex-shrink:0;
  }
  .eq span{
    width:3px;
    background: var(--amber);
    border-radius:1px;
    animation: bounce 0.9s ease-in-out infinite;
  }
  .eq span:nth-child(1){ height:40%; animation-delay:0s; }
  .eq span:nth-child(2){ height:100%; animation-delay:0.2s; }
  .eq span:nth-child(3){ height:65%; animation-delay:0.4s; }
  @keyframes bounce{
    0%,100%{ transform:scaleY(0.4); }
    50%{ transform:scaleY(1); }
  }

  .foot{
    padding:14px 28px 20px;
    border-top:1px solid var(--line);
    font-size:11px;
    color: var(--muted);
    text-align:center;
    line-height:1.5;
  }

  ::-webkit-scrollbar{ width:8px; }
  ::-webkit-scrollbar-thumb{ background: var(--line); border-radius:4px; }
</style>
</head>
<body>

<div class="deck">
  <div class="head">
    <div class="brand">Sae<span></span><small>plays files already on this device</small></div>
    <div class="counter"><span id="curTime">0:00</span> <span class="total">/ <span id="durTime">0:00</span></span></div>
  </div>

  <div class="nowplaying">
    <div class="np-title" id="npTitle"><span class="np-empty">No track loaded</span></div>
    <input type="range" class="seek" id="seek" value="0" min="0" max="100" step="0.1">
  </div>

  <div class="transport">
    <button class="tbtn" id="prevBtn" title="Previous">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
    </button>
    <button class="tbtn play" id="playBtn" title="Play">
      <svg viewBox="0 0 24 24" fill="currentColor" id="playIcon"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <button class="tbtn" id="nextBtn" title="Next">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zM6 6v12l8.5-6z"/></svg>
    </button>
  </div>

  <div class="vol">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 0 0-2.5-4v8a4.5 4.5 0 0 0 2.5-4z"/></svg>
    <input type="range" id="volume" min="0" max="1" step="0.01" value="0.8">
  </div>

  <div class="shelf-head">
    <div class="shelf-label">Your library</div>
    <button class="add-btn" id="addBtn">+ Add MP3s</button>
  </div>
  <input type="file" id="fileInput" accept="audio/*" multiple>

  <div class="dropzone" id="dropzone">Drag MP3 files here, or use "Add MP3s" above</div>

  <ul class="tracklist" id="tracklist"></ul>

  <div class="foot">Files are read directly from your device for this session only — nothing is uploaded, saved, or sent anywhere.</div>
</div>

<audio id="audio"></audio>

<script>
  const audio = document.getElementById('audio');
  const fileInput = document.getElementById('fileInput');
  const addBtn = document.getElementById('addBtn');
  const dropzone = document.getElementById('dropzone');
  const tracklistEl = document.getElementById('tracklist');
  const npTitle = document.getElementById('npTitle');
  const playBtn = document.getElementById('playBtn');
  const playIcon = document.getElementById('playIcon');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const seek = document.getElementById('seek');
  const curTime = document.getElementById('curTime');
  const durTime = document.getElementById('durTime');
  const volume = document.getElementById('volume');

  let playlist = []; // {name, url, duration}
  let currentIndex = -1;
  let isSeeking = false;

  const PLAY_SVG = '<path d="M8 5v14l11-7z"/>';
  const PAUSE_SVG = '<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>';

  function fmtTime(sec){
    if(!isFinite(sec) || sec < 0) sec = 0;
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60).toString().padStart(2,'0');
    return `${m}:${s}`;
  }

  function addFiles(fileList){
    const files = Array.from(fileList).filter(f => f.type.startsWith('audio/') || /\.(mp3|wav|ogg|m4a|flac)$/i.test(f.name));
    files.forEach(f => {
      playlist.push({ name: f.name.replace(/\.[^/.]+$/, ''), url: URL.createObjectURL(f), duration: null });
    });
    renderTracklist();
    if(currentIndex === -1 && playlist.length > 0){
      loadTrack(0);
    }
  }

  function renderTracklist(){
    tracklistEl.innerHTML = '';
    playlist.forEach((track, i) => {
      const li = document.createElement('li');
      li.className = 'track' + (i === currentIndex ? ' active' : '');
      li.innerHTML = `
        <span class="tnum">${(i+1).toString().padStart(2,'0')}</span>
        <span class="tname">${track.name}</span>
        ${i === currentIndex && !audio.paused ? '<div class="eq"><span></span><span></span><span></span></div>' : `<span class="tdur">${track.duration ? fmtTime(track.duration) : '--:--'}</span>`}
      `;
      li.addEventListener('click', () => loadTrack(i, true));
      tracklistEl.appendChild(li);
    });
  }

  function loadTrack(index, autoplay){
    if(index < 0 || index >= playlist.length) return;
    currentIndex = index;
    const track = playlist[index];
    audio.src = track.url;
    npTitle.textContent = track.name;
    renderTracklist();
    if(autoplay){
      audio.play().catch(()=>{});
    }
  }

  function togglePlay(){
    if(currentIndex === -1){
      if(playlist.length > 0) loadTrack(0, true);
      return;
    }
    if(audio.paused){
      audio.play().catch(()=>{});
    } else {
      audio.pause();
    }
  }

  audio.addEventListener('play', () => {
    playIcon.innerHTML = PAUSE_SVG;
    renderTracklist();
  });
  audio.addEventListener('pause', () => {
    playIcon.innerHTML = PLAY_SVG;
    renderTracklist();
  });
  audio.addEventListener('loadedmetadata', () => {
    if(currentIndex !== -1) playlist[currentIndex].duration = audio.duration;
    durTime.textContent = fmtTime(audio.duration);
    seek.max = audio.duration || 0;
    renderTracklist();
  });
  audio.addEventListener('timeupdate', () => {
    if(!isSeeking){
      seek.value = audio.currentTime;
      curTime.textContent = fmtTime(audio.currentTime);
    }
  });
  audio.addEventListener('ended', () => {
    if(currentIndex < playlist.length - 1){
      loadTrack(currentIndex + 1, true);
    }
  });

  seek.addEventListener('input', () => {
    isSeeking = true;
    curTime.textContent = fmtTime(parseFloat(seek.value));
  });
  seek.addEventListener('change', () => {
    audio.currentTime = parseFloat(seek.value);
    isSeeking = false;
  });

  volume.addEventListener('input', () => { audio.volume = parseFloat(volume.value); });
  audio.volume = parseFloat(volume.value);

  playBtn.addEventListener('click', togglePlay);
  prevBtn.addEventListener('click', () => { if(currentIndex > 0) loadTrack(currentIndex - 1, true); });
  nextBtn.addEventListener('click', () => { if(currentIndex < playlist.length - 1) loadTrack(currentIndex + 1, true); });

  addBtn.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', (e) => addFiles(e.target.files));

  ['dragenter','dragover'].forEach(evt => {
    dropzone.addEventListener(evt, (e) => { e.preventDefault(); dropzone.classList.add('drag'); });
  });
  ['dragleave','drop'].forEach(evt => {
    dropzone.addEventListener(evt, (e) => { e.preventDefault(); dropzone.classList.remove('drag'); });
  });
  dropzone.addEventListener('drop', (e) => {
    if(e.dataTransfer.files.length) addFiles(e.dataTransfer.files);
  });

  document.addEventListener('keydown', (e) => {
    if(e.code === 'Space' && document.activeElement.tagName !== 'INPUT'){
      e.preventDefault();
      togglePlay();
    }
  });
</script>

</body>
</html>
